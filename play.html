<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Let's Work!</title>
    <style>
        body { background: black; color: #ffcc00; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; height: 100vh; }
        #overall-progress-container { position: fixed; top: 0; width: 100%; height: 15px; background: #222; z-index: 100; border-bottom: 2px solid #444;}
        #overall-bar { width: 0%; height: 100%; background: linear-gradient(to right, #006600, #00ff00); transition: width 0.4s; }
        
        /* The Canvas must be behind the text but in front of the background */
        #fireworksCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 1; }
        
        #displayArea { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; text-align: center; padding: 20px; position: relative; z-index: 10; background: transparent; }
        
        .chore-name { font-size: 5rem; text-shadow: 0 0 30px #ff0000; text-transform: uppercase; animation: mkPulse 1.5s infinite; }
        #digital-clock { font-size: 3rem; color: #fff; margin: 20px 0; }
        
        #pauseBtn, #completeBtn { position: absolute; bottom: 80px; padding: 15px 25px; font-weight: bold; cursor: pointer; z-index: 110; min-width: 140px; border: 3px solid #ffcc00; }
        #pauseBtn { left: calc(50% - 110px); transform: translateX(-50%); background: #800000; color: white; }
        #completeBtn { left: calc(50% + 110px); transform: translateX(-50%); background: #ffcc00; color: black; border-color: #800000; }

        .trophy-image { width: 180px; height: auto; display: block; margin: 20px auto; filter: drop-shadow(0 0 25px #ffcc00); animation: bounceInPlace 2s ease-in-out infinite; }
        @keyframes bounceInPlace { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
        
        #blood-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: url('./blood splatter.png') no-repeat center; background-size: cover; opacity: 0; pointer-events: none; z-index: 150; }
        .splat-animation { animation: splat 1.2s ease-out forwards; }
        @keyframes splat { 0% { opacity: 0; transform: scale(0.5); } 20% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(1.1); } }
        @keyframes mkPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        footer { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); color: #ffcc00; padding: 10px 0; text-align: center; z-index: 200; border-top: 1px solid #444; }

        @media (max-width: 600px) { .chore-name { font-size: 2.2rem; } #pauseBtn { left: 25%; } #completeBtn { left: 75%; } .trophy-image { width: 120px; } }
    </style>
</head>
<body>
    <audio id="startSound" src="./gong-sound-mortal-kombat-x.mp3"></audio>
    <audio id="fatalitySound" src="./fatality.mp3"></audio>
    <audio id="victorySound" src="./Flawless_Victory_Sound_Effect.mp3"></audio>
    
    <div id="overall-progress-container"><div id="overall-bar"></div></div>
    <div id="blood-overlay"></div>
    <canvas id="fireworksCanvas"></canvas>
    
    <div id="displayArea">
        <div id="chore-text" class="chore-name">TAP TO START</div>
        <div id="digital-clock">READY?</div>
    </div>
    
    <button id="pauseBtn" style="display:none">PAUSE</button>
    <button id="completeBtn" style="display:none">COMPLETE</button>
    <div id="timer-progress-container" style="position: absolute; bottom: 0; width: 100%; height: 20px; background: #111; display:none; z-index: 5;"><div id="timer-bar" style="width: 100%; height: 100%; background: #ffcc00;"></div></div>
    
    <footer>Kim Ryan</footer>

    <script>
        const choreData = JSON.parse(localStorage.getItem('choreData'));
        const startSound = document.getElementById('startSound'), fatalitySound = document.getElementById('fatalitySound'), victorySound = document.getElementById('victorySound');
        const overallBar = document.getElementById('overall-bar'), displayArea = document.getElementById('displayArea');
        let currentIndex = 0, isPaused = false, countdown, timeLeft;

        const setup = () => {
            startSound.play().then(() => { startSound.pause(); startSequence(); });
            document.getElementById('pauseBtn').style.display = "block";
            document.getElementById('completeBtn').style.display = "block";
            document.querySelector('#timer-progress-container').style.display = "block";
            document.removeEventListener('click', setup);
        };
        document.addEventListener('click', setup);

        document.getElementById('completeBtn').onclick = () => {
            if (countdown) clearInterval(countdown);
            fatalitySound.currentTime = 0; fatalitySound.play().catch(()=>{});
            const blood = document.getElementById('blood-overlay');
            blood.classList.remove('splat-animation'); void blood.offsetWidth; blood.classList.add('splat-animation');
            currentIndex++; setTimeout(startSequence, 2500);
        };

        function startSequence() {
            if (countdown) clearInterval(countdown);
            if (!choreData || currentIndex >= choreData.length) {
                overallBar.style.width = "100%";
                setTimeout(() => { victorySound.play().catch(()=>{}); }, 500);
                displayArea.innerHTML = `
                    <h1 style="font-size:4rem; color:red; margin:0;">VICTORY</h1>
                    <img src="./trophy.png" class="trophy-image" alt="Trophy">
                    <button id="resetGame" style="padding:15px 40px; background:red; color:white; border:3px solid yellow; cursor:pointer; font-weight:bold;">NEW GAME</button>
                `;
                document.getElementById('resetGame').onclick = () => window.location.href='index.html';
                document.getElementById('pauseBtn').style.display = "none";
                document.getElementById('completeBtn').style.display = "none";
                document.querySelector('#timer-progress-container').style.display = "none";
                
                // Give the DOM a moment to breathe before drawing
                setTimeout(initFireworks, 100); 
                return;
            }
            startSound.currentTime = 0; startSound.play().catch(()=>{});
            const current = choreData[currentIndex];
            document.getElementById('chore-text').innerText = current.task;
            overallBar.style.width = `${(currentIndex / choreData.length) * 100}%`;
            let total = current.time * 60 * 1000; timeLeft = total;
            countdown = setInterval(() => {
                if (!isPaused) {
                    timeLeft -= 100;
                    document.getElementById('timer-bar').style.width = `${(timeLeft / total) * 100}%`;
                    const s = Math.max(0, Math.ceil(timeLeft/1000));
                    document.getElementById('digital-clock').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
                    if (timeLeft <= 0) { currentIndex++; startSequence(); }
                }
            }, 100);
        }

        function initFireworks() {
            const canvas = document.getElementById('fireworksCanvas');
            const ctx = canvas.getContext('2d');
            
            // Critical fix: set pixel width/height to match window
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            let particles = [];

            function loop() {
                // Background clear
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Add new particles
                if (particles.length < 40) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: canvas.height,
                        vx: (Math.random() - 0.5) * 6,
                        vy: Math.random() * -12 - 6,
                        color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                        size: Math.random() * 3 + 2
                    });
                }

                ctx.globalCompositeOperation = 'lighter';
                particles.forEach((p, i) => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15; // Gravity
                    
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    if (p.y > canvas.height) particles.splice(i, 1);
                });
                
                requestAnimationFrame(loop);
            }
            loop();
        }
    </script>
</body>
</html>
