<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose your Chores</title>
   <style>
    /* General Page Setup */
    body { 
        margin: 0; 
        background: black; 
        text-align: center; 
        min-height: 100vh; 
        padding-bottom: 70px; 
        overflow-x: hidden; 
    }
    
    #bg-video { 
        position: fixed; 
        right: 0; 
        bottom: 0; 
        min-width: 100%; 
        min-height: 100%; 
        z-index: -1; 
        object-fit: cover; 
    }

    #title2 { 
        margin-top: 30px; 
        padding: 0 15px; 
    }
    
    #title2 img { 
        width: 60%; 
        max-width: 600px; 
    }

    /* THE GRID: PC Version (9 Columns) */
    .grid-container { 
        display: grid; 
        grid-template-columns: repeat(9, 1fr); /* Stretches boxes to fill width */
        gap: 15px; 
        padding: 20px; 
        background: rgba(0,0,0,0.8); 
        border: 4px solid #444; 
        margin: 20px auto; 
        width: 95%; 
        max-width: 1200px; 
        box-sizing: border-box;
    }

    .chore-box { 
        aspect-ratio: 3 / 4; /* Keeps the rectangle shape consistent regardless of screen size */
        background-color: #333; 
        border: 3px solid #666; 
        cursor: pointer; 
        background-size: 60%; /* Prevents icons from touching the borders */
        background-position: center; 
        background-repeat: no-repeat; 
        transition: transform 0.1s, border-color 0.2s;
    }

    .chore-box.selected { 
        border-color: #ffcc00; 
        box-shadow: 0 0 20px #ffcc00; 
        transform: scale(0.95); 
    }

    /* Buttons and Footer */
    #confirmBtn { 
        margin: 20px 0; 
        background: transparent; 
        border: 2px solid red; 
        padding: 5px; 
        cursor: pointer; 
    }
    
    #confirmBtn img { 
        width: 300px; 
        max-width: 80%; 
    }

    footer { 
        position: fixed; 
        bottom: 0; 
        left: 0; 
        width: 100%; 
        background: rgba(0,0,0,0.7); 
        color: #ffcc00; 
        padding: 10px 0; 
        font-family: 'Courier New', monospace; 
        text-align: center; 
        z-index: 200; 
        border-top: 1px solid #444; 
    }

    /* RESPONSIVE BREAKPOINTS */

    /* Tablets / Small Laptops: 6 Columns */
    @media (max-width: 1024px) {
        .grid-container { 
            grid-template-columns: repeat(6, 1fr); 
        }
    }

    /* Mobile Phones: 3 Columns */
    @media (max-width: 600px) { 
        .grid-container { 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
            padding: 10px; 
            width: 98%; /* Uses almost full screen width on mobile */
        }
        
        #title2 img { 
            width: 90%; 
        }

        .chore-box {
            border-width: 2px; /* Thinner border looks better on small screens */
        }
    }
</style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="./Fire_Embers_23___22s___4k_res (1).mp4" type="video/mp4"></video>
    <div id="title2"><img src="./mc title.png"/></div>
    <div class="grid-container" id="choreGrid">
        <!-- Boxes generated exactly as your original snippet -->
        <div class="chore-box" data-id="dusting" data-name="dusting" style="background-image: url('./icons8-dusting-64.png');"></div>
        <div class="chore-box" data-id="sweep" data-name="sweep" style="background-image: url('./icons8-broom-64.png');"></div>
        <div class="chore-box" data-id="mop" data-name="mop" style="background-image: url('./icons8-mop-64.png');"></div>
        <div class="chore-box" data-id="vacuum" data-name="vacuum" style="background-image: url('./icons8-vacuum-cleaner-64.png');"></div>
        <div class="chore-box" data-id="dishes" data-name="dishes" style="background-image: url('./icons8-washing-64.png');"></div>
        <div class="chore-box" data-id="wash-laundry" data-name="wash laundry" style="background-image: url('./icons8-washing-machine-64.png');"></div>
        <div class="chore-box" data-id="pack-laundry" data-name="pack laundry" style="background-image: url('./icons8-hanger-64.png');"></div>
        <div class="chore-box" data-id="ironing" data-name="ironing" style="background-image: url('./icons8-ironing-64.png');"></div>
        <div class="chore-box" data-id="bathroom" data-name="bathroom" style="background-image: url('./icons8-toilet-64.png');"></div>
        <div class="chore-box" data-id="bedroom" data-name="bedroom" style="background-image: url('./icons8-bed-85.png');"></div>
        <div class="chore-box" data-id="trash" data-name="trash" style="background-image: url('./icons8-trash-64.png');"></div>
        <div class="chore-box" data-id="cook" data-name="cook" style="background-image: url('./icons8-cooking-64.png');"></div>
        <div class="chore-box" data-id="pets" data-name="pet-care" style="background-image: url('./icons8-pet-food-64.png');"></div>
        <div class="chore-box" data-id="pot-plants" data-name="pot-plants" style="background-image: url('./icons8-watering-plants-64.png');"></div>
        <div class="chore-box" data-id="garden" data-name="garden" style="background-image: url('./icons8-rake-64.png');"></div>
        <div class="chore-box" data-id="devices" data-name="device care" style="background-image: url('./icons8-clean-64.png');"></div>
        <div class="chore-box" data-id="groceries" data-name="groceries" style="background-image: url('./icons8-grocery-64.png');"></div>
        <div class="chore-box" data-id="garage" data-name="garage" style="background-image: url('./icons8-garage-64.png');"></div>
    </div>
    <button id="confirmBtn"><img src="./confirm selection.png"/></button>
    <footer>Kim Ryan</footer>
    <script>
        const grid = document.getElementById('choreGrid');
        let selectedChores = [];
        grid.addEventListener('click', (e) => {
            const box = e.target.closest('.chore-box');
            if (!box) return;
            const id = box.dataset.id;
            const name = box.dataset.name;
            if (box.classList.toggle('selected')) {
                const mins = parseFloat(prompt(`Minutes for ${name}:`, "5")) || 5;
                selectedChores.push({ id, task: name, time: mins });
            } else { selectedChores = selectedChores.filter(i => i.id !== id); }
        });
        document.getElementById('confirmBtn').onclick = () => {
            if (selectedChores.length === 0) alert("NO CHORES SELECTED!");
            else { localStorage.setItem('choreData', JSON.stringify(selectedChores)); window.location.href = 'play.html'; }
        };
    </script>
</body>
</html>
